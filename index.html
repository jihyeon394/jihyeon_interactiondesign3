<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fascination</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Ballet&family=Explora&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{.
    width:100%;
    min-height:100%;
}

body{
    overflow-x:hidden;
    background:black;
}

/* ================= SECTION 1 ================= */

.cover{
    position:relative;
    width:100vw;
    height:100vh;
    isolation:isolate;

    background:linear-gradient(
        180deg,
        #FB00FF 0%,
        #000000 77%,
        #000000 100%
    );
}

.bg-image{
    position:absolute;
    left:50%;
    top:45%;

    width:100%;
    height:auto;

    transform:translate(-50%, -50%);

    opacity:0.35;
    mix-blend-mode:screen;

    z-index:1;
}

.title-back{
    position:absolute;
    left:50%;
    top:80%;

    transform:translate(-50%,-50%) scaleY(1.5);

    font-family:"Ballet", cursive;
    font-size:247px;
    font-weight:400;

    color:#1E44FF;

    white-space:nowrap;

    z-index:2;
}

.title-front{
    position:absolute;
    left:50%;
    top:80%;

    transform:translate(-50%,-50%);

    font-family:"Explora", serif;
    font-size:378px;
    font-weight:400;
    line-height:1.25;

    color:#FB00FF;

    white-space:nowrap;

    z-index:3;
    opacity:0;

    animation:flickerOn 2.5s forwards;
}

@keyframes flickerOn{
    0%,10%,20%,30%{
        opacity:0;
    }

    5%,15%,25%{
        opacity:1;
    }

    40%{
        opacity:0.2;
    }

    60%{
        opacity:0.7;
    }

    80%{
        opacity:0.9;
    }

    100%{
        opacity:1;
    }
}

/* ================= SECTION 2 ================= */

.scene2{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;

    background:black;
}

/* 전체 배경 사진 */

.scene-bg{
    position:absolute;
    left:0;
    top:0;

    width:100%;
    height:100%;

    object-fit:cover;

    filter:blur(5px) brightness(0.38) saturate(0.85);

    transform:scale(1.04);

    z-index:1;
}

/* 어두운 색감 오버레이 */

.scene2::after{
    content:"";
    position:absolute;
    inset:0;

    background:linear-gradient(
        180deg,
        rgba(0,0,0,0.1) 0%,
        rgba(0,0,0,0.35) 55%,
        rgba(0,0,0,0.75) 100%
    );
x
    z-index:2;
    pointer-events:none;
}

/* 왼쪽 사진 */

.left-photo{
    position:absolute;
    left:0px;
    bottom:0vh;

    width:380px;

    object-fit:cover;

    opacity:1;
    filter:none;

    z-index:4;
}

/* 오른쪽 사진 */

.right-photo{
    position:absolute;
    right:0;
    top:0vh;

    width:340px;

    object-fit:cover;

    opacity:1;
    filter:none;

    z-index:4;
}

/* 커서 따라오는 밝은 박스 공통 */

.focus-box{
    position:absolute;

    width:220px;
    height:220px;

    overflow:hidden;

    border:1.5px solid #FB00FF;

    pointer-events:none;

    z-index:20;

    opacity:0;
    transition:opacity 0.2s ease;
}

.focus-box img{
    position:absolute;

    width:100vw;
    height:100vh;

    object-fit:cover;

    filter:brightness(1.35) contrast(1.25) saturate(1.2);
}

/* 두 번째 박스는 살짝 작게 */

.focus2{
    width:180px;
    height:180px;
    opacity:0;
    border-color:#1E44FF;
}

/* 텍스트 */

.scene-text{
    position:absolute;
    left:402px;
    top:160px;

    font-family:"Explora", serif;
    font-size:52px;
    color:#FB00FF;

    z-index:10;
}

.scene-text.small{
    left:970px;
    top:288px;
    font-size:52px;
}

.korean-text{
    position:absolute;
    right:249px;
    bottom:20px;

    width:292.8px;

    font-family:"Noto Sans KR", sans-serif;
    font-size:9px;
    line-height:1.7;

    color:#FB00FF;

    z-index:10;
}
</style>
</head>

<body>

<section class="cover">

    <img class="bg-image" src="wave.png" alt="background image">

    <h1 class="title-back">La Fascination</h1>
    <h1 class="title-front">La Fascination</h1>

</section>

<section class="scene2">

    <img class="scene-bg" src="forest.jpg" alt="forest background">

    <img class="left-photo" src="left.jpg" alt="left image">
    <img class="right-photo" src="right.jpg" alt="right image">

    <div class="focus-box focus1">
        <img src="forest.jpg" alt="focused image">
    </div>

    <div class="focus-box focus2">
        <img src="forest.jpg" alt="focused image">
    </div>

    <p class="scene-text">you see.</p>
    <p class="scene-text small">you choose.</p>

    <p class="korean-text">
        당신의 앞에 매혹적인 무언가가 놓여 있다.<br>
        당신은 무엇을 볼지, 무엇을 받아들일지,<br>
        얼마나 오래 시선을 둘지 스스로 결정한다고 믿는다.<br>
        당신은 보는 사람이 자신이라고 생각한다.<br>
        아직 자신의 시선이 자신의 통제 아래 있다고 믿는다.
    </p>

</section>

<script>
const scene2 = document.querySelector(".scene2");
const focus1 = document.querySelector(".focus1");
const focus2 = document.querySelector(".focus2");
const focusImg1 = document.querySelector(".focus1 img");
const focusImg2 = document.querySelector(".focus2 img");

scene2.addEventListener("mousemove", function(e){

    const rect = scene2.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const size1 = 130;
    const size2 = 105;

    focus1.style.opacity = 1;
    focus2.style.opacity = 1;

    focus1.style.left = (x - size1 / 2) + "px";
    focus1.style.top = (y - size1 / 2) + "px";

    focus2.style.left = (x + 200) + "px";
    focus2.style.top = (y - 250) + "px";

    focusImg1.style.left = -(x - size1 / 2) + "px";
    focusImg1.style.top = -(y - size1 / 2) + "px";

    focusImg2.style.left = -(x + 120) + "px";
    focusImg2.style.top = -(y - 150) + "px";
});

scene2.addEventListener("mouseleave", function(){
    focus1.style.opacity = 0;
    focus2.style.opacity = 0;
});
</script>

</body>
</html>
